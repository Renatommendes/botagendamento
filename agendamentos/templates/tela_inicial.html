{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Tela Inicial</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ece5dd;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    header {
      background-color: #075E54;
      color: white;
      padding: 15px 25px;
      display: flex;
      align-items: center;
    }

    header img {
      height: 50px;
      width: auto;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    main h1 {
      font-size: 32px;
      color: #075E54;
      margin-bottom: 10px;
    }

    main p {
      font-size: 18px;
      color: #333;
      margin-bottom: 30px;
    }

    .botao-acessar {
      background-color: #25d366;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 25px;
      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s;
    }

    .botao-acessar:hover {
      background-color: #20b558;
    }

    footer {
      background-color: #075E54;
      color: white;
      text-align: center;
      padding: 10px 0;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- Cabeçalho com logo -->
  <header>
    <img src="{% static 'img/logo.png' %}" alt="Logo da Empresa" style="width: 150px; height: auto;">
  </header>

  <!-- Conteúdo principal -->
  <main>
    <h1>Bem-vindo ao Painel de Atendimento</h1>
    <p>Gerencie suas conversas e atendimentos de forma simples e rápida.</p>
    <a href="{% url 'painel' %}" class="botao-acessar">Acessar Painel</a>
  </main>

  <!-- Rodapé -->
  <footer>
    © 2025 - 51.755.082 RENATO MARQUES MENDES | CNPJ: 51.755.082/0001-15
  </footer>

</body>
</html>
